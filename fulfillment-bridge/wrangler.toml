name = "devtools-square-bridge"
main = "src/index.js"
compatibility_date = "2024-10-01"

# Secrets (do not commit values):
#   wrangler secret put SQUARE_ACCESS_TOKEN
#   wrangler secret put SQUARE_WEBHOOK_SIGNATURE_KEY
#   wrangler secret put RESEND_API_KEY
# wrangler.toml vars (non-secret):
# [vars]
# SQUARE_ENVIRONMENT = "production"
# SQUARE_LOCATION_ID = "L..."
# SQUARE_WEBHOOK_NOTIFICATION_URL = "https://devtools-square-bridge.<you>.workers.dev/webhook"
# PUBLIC_SITE_ORIGIN = "https://gitsomeuser.github.io"
# PUBLIC_SITE_PATH_PREFIX = "/devtools"
# SQUARE_API_VERSION = "2024-10-17"
# FULFILL_FROM_EMAIL = "fulfillment@yourdomain.com"
# FULFILL_TO_OVERRIDE_EMAIL = ""   # optional test override
# Private product bodies (markdown): keys product:<sku> — see fulfillment-bridge/README.md
[[kv_namespaces]]
binding = "DELIVERABLES"
id = "14b4aafb900645f1ae17e491a1d059be"

[vars]
SQUARE_ENVIRONMENT = "production"
SQUARE_LOCATION_ID = "L0JDKBT4YJYX1"
SQUARE_WEBHOOK_NOTIFICATION_URL = "https://devtools-square-bridge.stratumsatoshi.workers.dev/webhook"
PUBLIC_SITE_ORIGIN = "https://gitsomeuser.github.io"
PUBLIC_SITE_PATH_PREFIX = "/devtools"
SQUARE_API_VERSION = "2024-10-17"
FULFILL_FROM_EMAIL = "fulfill@stratumsatoshi.com"
FULFILL_TO_OVERRIDE_EMAIL = ""
